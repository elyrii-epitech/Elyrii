version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_elyrii
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=elyrii_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./elyrii_server/init_dbs.sh:/docker-entrypoint-initdb.d/init_dbs.sh
    networks:
      - elyrii_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pg_data:

networks:
  elyrii_net:
    driver: bridge
