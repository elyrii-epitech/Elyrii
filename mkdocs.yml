site_name: Elyrii
site_description: Project overview, technical choices, and links to Mobile, Server, and AI documentation.
site_url: https://elyrii-epitech.github.io/Elyrii
repo_url: https://github.com/elyrii-epitech/Elyrii
theme:
  name: material
  features:
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
nav:
  - Home: index.md
  - Mobile:
      - Overview: mobile/index.md
      - Architecture: mobile/architecture.md
      - Dependencies: mobile/dependencies.md
      - Features: mobile/features.md
      - Design System: mobile/design.md
      - CI/CD: mobile/ci-cd.md
      - Development: mobile/development.md
      - Generated Docs: mobile/api/index.md
  - Server:
      - Overview: server/index.md
      - Generated Docs: server/api/index.md
  - AI:
      - Overview: ai/index.md
      - Hosting: ai/hosting.md
      - Scalability: ai/scalability.md
      - Training: ai/training.md
      - Generated Docs: ai/api/index.md
  - Epitech:
      - BTP: epitech/btp.md
      - C39: epitech/c39-diffusion-information.md
plugins:
  - search
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - def_list
  - attr_list
  - footnotes
extra:
  social:
    - icon: material/github
      link: https://github.com/elyrii-epitech/Elyrii
