name: Build AI Sphinx Docs

on:
  push:
    branches: [dev, main]
    paths:
      - 'elyrii_ai/**'
      - '.github/workflows/build-ai-sphinx-docs.yml'
  workflow_dispatch:

jobs:
  build-sphinx-docs:
    name: Build AI Sphinx Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install elyrii_ai dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r elyrii_ai/requirements.txt

      - name: Install Sphinx and documentation dependencies
        run: |
          pip install -r elyrii_ai/docs/requirements.txt

      - name: Build Sphinx documentation
        working-directory: elyrii_ai/docs
        run: |
          make html

      - name: Check build output
        run: |
          if [ ! -f "elyrii_ai/docs/_build/html/index.html" ]; then
            echo "Error: Documentation build failed - index.html not found"
            exit 1
          fi
          echo "Documentation built successfully"

      - name: Upload AI docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-docs-html
          path: elyrii_ai/docs/_build/html/
          retention-days: 30

      - name: Display build summary
        run: |
          echo "### ✅ Sphinx Documentation Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Documentation artifact uploaded as \`ai-docs-html\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Artifact Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Location: \`elyrii_ai/docs/_build/html/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 30 days" >> $GITHUB_STEP_SUMMARY

  # Optional: Check documentation quality
  check-docs-quality:
    name: Check Documentation Quality
    runs-on: ubuntu-latest
    needs: build-sphinx-docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r elyrii_ai/requirements.txt
          pip install -r elyrii_ai/docs/requirements.txt

      - name: Check documentation coverage
        working-directory: elyrii_ai/docs/source
        run: |
          make coverage
          echo "### 📊 Documentation Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat _build/coverage/python.txt >> $GITHUB_STEP_SUMMARY || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Check for documentation warnings
        working-directory: elyrii_ai/docs
        run: |
          make html 2>&1 | tee build.log
          if grep -i "warning" build.log; then
            echo "### ⚠️ Documentation Warnings Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -i "warning" build.log >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ No Documentation Warnings" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true
