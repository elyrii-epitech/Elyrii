name: Build Elyrii Server Docs

on:
  push:
    branches: [ dev, main ]
    paths:
      - 'elyrii_server/**'
      - '.github/workflows/build-elyrii-server-docs.yml'
  pull_request:
    branches: [ dev, main ]
    paths:
      - 'elyrii_server/**'
      - '.github/workflows/build-elyrii-server-docs.yml'
  workflow_dispatch:

jobs:
  build-server-docs:
    name: Build Elyrii Server TypeDoc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elyrii_server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install

      - name: Build server documentation
        run: bun run docs

      - name: Upload server docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-docs-html
          path: docs/
          retention-days: 30

      - name: Build summary
        run: |
          echo "### Elyrii Server Docs Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`server-docs-html\` (contents of elyrii_server/docs)" >> $GITHUB_STEP_SUMMARY
