name: Elyrii AI Unit Tests
permissions:
  contents: read

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'elyrii_ai/**'
      - '.github/workflows/ai-tests.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'elyrii_ai/**'
      - '.github/workflows/ai-tests.yml'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f elyrii_ai/requirements.txt ]; then pip install -r elyrii_ai/requirements.txt; fi

      - name: Run Tests
        run: |
          # Add current directory to PYTHONPATH so 'elyrii_ai' package can be resolved
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m unittest discover -s elyrii_ai/test -p "test_*.py"