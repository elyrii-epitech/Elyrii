name: Backend Docker Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elyrii_server
    env:
      AUTH_DB_NAME: ${{ secrets.AUTH_DB_NAME }}
      CHAT_DB_NAME: ${{ secrets.CHAT_DB_NAME }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: ${{ secrets.DB_PORT }}
      GATEWAY_PORT: ${{ secrets.GATEWAY_PORT }}
      GATEWAY_SECRET_KEY: ${{ secrets.GATEWAY_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker images
        run: |
          echo "Building backend images with secrets..."
          docker compose build