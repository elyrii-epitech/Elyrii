name: Build Elyrii Server Docs
permissions:
  contents: read

on:
  push:
    branches: [ dev, main ]
    paths:
      - 'elyrii_server/**'
      - '.github/workflows/build-backend-docs.yml'
  pull_request:
    branches: [ dev, main ]
    paths:
      - 'elyrii_server/**'
      - '.github/workflows/build-backend-docs.yml'
  workflow_dispatch:

jobs:
  build-server-docs:
    name: Build Elyrii Server TypeDoc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elyrii_server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Install dependencies
        run: |
          bun install
          cd scripts && bun install

      - name: Build server documentation
        run: |
          cd scripts && ./generate-docs.sh build

      - name: Upload server docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-docs-html
          path: elyrii_server/docs/api/
          retention-days: 30

      - name: Build summary
        run: |
          echo "### Elyrii Server Docs Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`server-docs-html\` (contents of docs/api/)" >> $GITHUB_STEP_SUMMARY
          echo "Generated documentation available in the workflow artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The monolithic API documentation is now available as a workflow artifact." >> $GITHUB_STEP_SUMMARY
          echo "You can download it from the 'Actions' tab in the repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The documentation is generated using TypeDoc and includes comprehensive API references for all modules: Auth, Chat, Journal, Quest, and User." >> $GITHUB_STEP_SUMMARY